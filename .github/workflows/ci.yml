name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly drift check (Monday 06:00 UTC)
    - cron: "0 6 * * 1"

# Least-privilege: verify + build only need to read repo and PRs.
permissions:
  contents: read
  pull-requests: read

# Cancel in-progress runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint + Test + Type + Security (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      # Keep other Python versions running when one fails — partial signal > no signal.
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          # Full history so `git blame` and coverage tools can attribute lines.
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install uv
        run: pip install --upgrade uv

      - name: Create venv and install project + dev extras
        # Pin ruff in CI to match what `make verify` runs locally. The
        # `ruff>=0.6` spec in pyproject.toml gives a moving target — newer
        # ruff versions reformat existing files differently, which made
        # the first CI run fail on `ruff format --check` for 24 files
        # (none of which had been changed in the PR). Pinning to the same
        # major.minor version local dev uses keeps CI deterministic.
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"
          uv pip install "ruff>=0.15,<0.16"

      - name: Lint (ruff)
        run: source .venv/bin/activate && ruff check src/ tests/

      - name: Format check (ruff format)
        run: source .venv/bin/activate && ruff format --check src/ tests/

      - name: Type check (mypy --strict)
        run: source .venv/bin/activate && mypy --strict src/mnemos/

      - name: Security (bandit)
        # JSON output is uploaded as artifact on failure for debugging.
        run: source .venv/bin/activate && bandit -r src/ -f json -o bandit-report.json

      - name: Security (pip-audit)
        # CVE-2026-45829 has no upstream fix; tracked separately in dependency-updates.md.
        run: source .venv/bin/activate && pip-audit --ignore-vuln CVE-2026-45829

      - name: Test (pytest)
        run: source .venv/bin/activate && pytest tests/ -q --tb=short

      - name: Coverage check (gate ≥ 80%)
        run: source .venv/bin/activate && pytest --cov=src/mnemos --cov-fail-under=80 --cov-report=term-missing --cov-report=xml tests/ -q

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          # Don't fail the run just because Codecov is down — the gate already ran.
          fail_ci_if_error: false
          # Use the CODECOV_TOKEN repo secret when set; action auto-detects otherwise.
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload bandit report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report-py${{ matrix.python-version }}
          path: bandit-report.json
          if-no-files-found: warn
          retention-days: 7

  build-container:
    name: Container build smoke
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      # buildah is the official Red Hat rootless build tool — no Docker daemon required,
      # no privileged mode, and works on stock ubuntu-latest runners.
      - name: Install buildah
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends buildah

      - name: Build image
        run: buildah bud -t mnemos:test .

      - name: Smoke test — mnemos CLI inside container
        # NOTE: The Containerfile is still mid-rebrand (still references ai-brain).
        # When the rebrand lands, change this to `buildah run mnemos-test -- mnemos --help`.
        run: |
          buildah from --name mnemos-test mnemos:test
          buildah run mnemos-test -- python -c "import sys; print('python', sys.version.split()[0])"
