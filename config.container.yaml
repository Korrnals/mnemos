# Mnemos container config — paths mapped to container volumes
mnemos:
  vault_path: /vault
  data_dir: /data

embedding:
  # Default: chromadb built-in ONNX embeddings (no torch)
  provider: chromadb
  # To use Ollama from host/separate container:
  # provider: ollama
  # model: nomic-embed-text
  # ollama_url: http://ollama:11434

search:
  default_limit: 20
  hybrid_alpha: 0.7

api:
  host: 0.0.0.0
  port: 8787
  # SECURITY: the container binds 0.0.0.0, so the startup guard in
  # src/mnemos/api/main.py (_check_non_loopback_auth) REQUIRES all three
  # flags below to be true AND env MNEMOS_API__TOTP_MASTER_KEY to be
  # non-empty — container will refuse to start without them (fail-closed).
  # Supply MNEMOS_API__TOTP_MASTER_KEY at runtime (EnvironmentFile or
  # compose environment block); do NOT hardcode it here.
  # behind_tls_proxy: true also asserts TLS terminates upstream — operators
  # MUST front the published port with a TLS-terminating reverse proxy
  # (or only publish on a trusted internal network).
  auth_enabled: true
  totp_enabled: true
  behind_tls_proxy: true

mcp:
  transport: stdio
