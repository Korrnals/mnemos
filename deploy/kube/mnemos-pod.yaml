# Kubernetes-style pod manifest for Podman
# Usage: podman kube play deploy/kube/mnemos-pod.yaml
# Stop:  podman kube down deploy/kube/mnemos-pod.yaml
apiVersion: v1
kind: Pod
metadata:
  name: mnemos
  labels:
    app: mnemos
spec:
  containers:
    - name: api
      image: localhost/mnemos:latest
      ports:
        - containerPort: 8787
          hostPort: 8787
          protocol: TCP
      env:
        - name: MNEMOS_CONFIG
          value: /app/config.yaml
      volumeMounts:
        - name: mnemos-data
          mountPath: /data
        - name: mnemos-vault
          mountPath: /vault
      resources:
        limits:
          memory: "2Gi"
          cpu: "2"
        requests:
          memory: "512Mi"
          cpu: "500m"
  volumes:
    - name: mnemos-data
      persistentVolumeClaim:
        claimName: mnemos-data
    - name: mnemos-vault
      persistentVolumeClaim:
        claimName: mnemos-vault
