# Kubernetes-style pod manifest for Podman
# Usage: podman kube play deploy/kube/ai-brain-pod.yaml
# Stop:  podman kube down deploy/kube/ai-brain-pod.yaml
apiVersion: v1
kind: Pod
metadata:
  name: ai-brain
  labels:
    app: ai-brain
spec:
  containers:
    - name: api
      image: localhost/ai-brain:latest
      ports:
        - containerPort: 8787
          hostPort: 8787
          protocol: TCP
      env:
        - name: AI_BRAIN_CONFIG
          value: /app/config.yaml
      volumeMounts:
        - name: brain-data
          mountPath: /data
        - name: brain-vault
          mountPath: /vault
      resources:
        limits:
          memory: "2Gi"
          cpu: "2"
        requests:
          memory: "512Mi"
          cpu: "500m"
  volumes:
    - name: brain-data
      persistentVolumeClaim:
        claimName: brain-data
    - name: brain-vault
      persistentVolumeClaim:
        claimName: brain-vault
