mnemos:
  # Consolidated layout (v2.1): everything under ~/.mnemos/
  #   ~/.mnemos/config.yaml  ← this file
  #   ~/.mnemos/data/         ← SQLite DBs (mnemos.db, vectors.db)
  #   ~/.mnemos/vault/        ← markdown vault
  #   ~/.mnemos/logs/         ← log files
  #   ~/.mnemos/cache/        ← embedding model cache, temp files
  # Old paths (~/mnemos-vault, ~/.mnemos as data_dir) are auto-migrated on first run.
  vault_path: ~/.mnemos/vault
  data_dir: ~/.mnemos/data

embedding:
  # Default: chromadb — uses built-in ONNX model (all-MiniLM-L6-v2), no torch needed
  provider: chromadb
  # Alternative: Ollama (CPU works fine for embeddings)
  # provider: ollama
  # model: nomic-embed-text
  # ollama_url: http://localhost:11434
  # Alternative: sentence-transformers (requires ~2GB torch)
  # provider: sentence-transformers
  # model: intfloat/multilingual-e5-base

search:
  default_limit: 20
  hybrid_alpha: 0.7

api:
  host: 127.0.0.1
  port: 8787
  # --- Authentication (T-AUTH, ADR-0014) ---
  auth_enabled: false             # set true to enforce token auth on all routes
  totp_enabled: false             # set true to require TOTP 2FA after token login
  # totp_master_key is env-only — set via MNEMOS_API__TOTP_MASTER_KEY; required when totp_enabled=true
  session_ttl_sec: 28800          # session lifetime in seconds (range 300–86400; default 8 h)
  session_pin_ip: false           # bind session token to the creation client IP
  behind_tls_proxy: false         # set true when TLS terminates upstream (required for non-loopback bind)
  trusted_proxies: []             # CIDRs whose X-Forwarded-For is trusted, e.g. ["10.0.0.0/8"]
  # --- CORS (T-CORS, ADR-0014) ---
  cors_enabled: false             # set true to enable CORS response headers
  cors_allow_origins: []          # allowed origins, e.g. ["http://localhost:5173"]
  cors_allow_credentials: false   # allow cookies/auth headers cross-origin (cannot combine with origins=["*"])
  cors_allow_methods:             # HTTP methods exposed to cross-origin requests
    - GET
    - POST
    - DELETE
  cors_allow_headers:             # request headers exposed to cross-origin requests
    - Authorization
    - Content-Type

mcp:
  transport: stdio

watcher:
  # Directories to auto-index (used by `mnemos watch` when no args given)
  paths: []
  # paths:
  #   - ~/Projects
  #   - ~/LABs
  ignore_dirs:
    - .git
    - node_modules
    - __pycache__
    - .venv
    - venv
    - dist
    - build
  extensions:
    - .md
    - .py
    - .js
    - .ts
    - .yaml
    - .yml
    - .toml
    - .json
    - .txt
    - .sh
    - .sql
  max_file_size_kb: 512
  auto_scan: true

# ── Logging (v2.1) ───────────────────────────────────────────────────────────
# File logging with rotation. Set log_file to empty ("") for stderr-only output.
logging:
  level: INFO                    # DEBUG | INFO | WARNING | ERROR
  log_file: ~/.mnemos/logs/mnemos.log
  max_file_size_mb: 10           # rotating file handler — max size per file
  backup_count: 3                # keep N rotated files
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"
