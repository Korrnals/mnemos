mnemos:
  # Consolidated layout (v2.1): everything under ~/.mnemos/
  #   ~/.mnemos/config.yaml  ← this file
  #   ~/.mnemos/data/         ← SQLite DBs (mnemos.db, vectors.db)
  #   ~/.mnemos/vault/        ← markdown vault
  #   ~/.mnemos/logs/         ← log files
  #   ~/.mnemos/cache/        ← embedding model cache, temp files
  # Old paths (~/mnemos-vault, ~/.mnemos as data_dir) are auto-migrated on first run.
  vault_path: ~/.mnemos/vault
  data_dir: ~/.mnemos/data

embedding:
  # Default: chromadb — uses built-in ONNX model (all-MiniLM-L6-v2), no torch needed
  provider: chromadb
  # Alternative: Ollama (CPU works fine for embeddings)
  # provider: ollama
  # model: nomic-embed-text
  # ollama_url: http://localhost:11434
  # Alternative: sentence-transformers (requires ~2GB torch)
  # provider: sentence-transformers
  # model: intfloat/multilingual-e5-base

search:
  default_limit: 20
  hybrid_alpha: 0.7

api:
  host: 127.0.0.1
  port: 8787
  # --- Authentication (T-AUTH, ADR-0014) ---
  auth_enabled: false             # set true to enforce token auth on all routes
  totp_enabled: false             # set true to require TOTP 2FA after token login
  # totp_master_key is env-only — set via MNEMOS_API__TOTP_MASTER_KEY; required when totp_enabled=true
  session_ttl_sec: 28800          # session lifetime in seconds (range 300–86400; default 8 h)
  session_pin_ip: false           # bind session token to the creation client IP
  behind_tls_proxy: false         # set true when TLS terminates upstream (required for non-loopback bind)
  trusted_proxies: []             # CIDRs whose X-Forwarded-For is trusted, e.g. ["10.0.0.0/8"]
  # --- CORS (T-CORS, ADR-0014) ---
  cors_enabled: false             # set true to enable CORS response headers
  cors_allow_origins: []          # allowed origins, e.g. ["http://localhost:5173"]
  cors_allow_credentials: false   # allow cookies/auth headers cross-origin (cannot combine with origins=["*"])
  cors_allow_methods:             # HTTP methods exposed to cross-origin requests
    - GET
    - POST
    - DELETE
  cors_allow_headers:             # request headers exposed to cross-origin requests
    - Authorization
    - Content-Type

mcp:
  transport: stdio

watcher:
  # Directories to auto-index (used by `mnemos watch` when no args given)
  paths: []
  # paths:
  #   - ~/Projects
  #   - ~/LABs
  ignore_dirs:
    - .git
    - node_modules
    - __pycache__
    - .venv
    - venv
    - dist
    - build
  extensions:
    - .md
    - .py
    - .js
    - .ts
    - .yaml
    - .yml
    - .toml
    - .json
    - .txt
    - .sh
    - .sql
  max_file_size_kb: 512
  auto_scan: true

# ── Federation (Phase 0 batch sync, issue #85) ───────────────────────────────
# Operator-curated, OFFLINE, cron-triggered batch sync between two mnemos
# instances. NOT networked — transfer is out-of-band (rsync / scp / shared
# volume by the operator). See ArchCom 2026-07-17 federation contract §3.1.
federation:
  # Whitelist of project slugs eligible for sync. Only records whose
  # project: tag matches a slug in this list are included in
  # `mnemos sync export`. Empty list = no projects are eligible.
  # The receiving side re-applies the same filter on import.
  shared_projects: []
  # shared_projects:
  #   - mnemos
  #   - project-umbra
  # TTL (hours) for the per-run moderation mapping table. The mapping is
  # in-memory only and NEVER replicated (it is a leak surface). After
  # expiry, a fresh mapping is issued on the next moderation run.
  # Range: 1–168 (1 hour to 7 days). Default: 24.
  moderation_mapping_ttl_hours: 24
  # Fraction of content that must be redacted/anonymized to trigger a
  # `refuse` verdict (contract §2.2). If >threshold of content is
  # redacted or anonymized, the record is refused (no useful remainder).
  # Range: 0.0–1.0. Default: 0.8 (80%).
  moderation_refuse_threshold: 0.8

# ── Background secrets scanner (Layer 2 defence-in-depth, issue #89) ──────────
# Periodically re-scans the whole corpus for secrets missed by the
# write-path scanner (Layer 1, #86) and auto-tags `mnemos:no-federate`.
# Re-uses `secrets_detector.detect_secrets` unchanged (DRY — one source
# of truth for patterns). See ArchCom 2026-07-17 federation contract
# §2.2.1. The scanner runs on its own daemon thread alongside the
# background processor; it never blocks the MCP server or HTTP API.
scanner:
  # Master switch. When false, `start()` is a no-op and the scanner does
  # not run. Defence-in-depth is on by default — opt out explicitly.
  enabled: true
  # Wall-clock interval between automatic scan passes. Range: 1–168
  # (1 hour to 7 days). Default: 6h per contract §2.2.1.
  interval_hours: 6
  # When true, `run_scan` only scans records whose created_at OR
  # updated_at is newer than the last successful scan. When false, every
  # scan is a full corpus scan. The CLI `--full` flag forces a full scan
  # for one run.
  incremental: true

# ── Logging (v2.1) ───────────────────────────────────────────────────────────
# File logging with rotation. Set log_file to empty ("") for stderr-only output.
logging:
  level: INFO                    # DEBUG | INFO | WARNING | ERROR
  log_file: ~/.mnemos/logs/mnemos.log
  max_file_size_mb: 10           # rotating file handler — max size per file
  backup_count: 3                # keep N rotated files
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"
